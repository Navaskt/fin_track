name: fin_track
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
# core
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.0.3
  hooks_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3+1
  go_router: ^17.2.3
# state management & routing
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
# database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
# utilities
  path: ^1.9.1
  intl: ^0.20.2
  uuid: ^4.5.1
  fl_chart: ^1.2.0
# security
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.2.0
  cryptography: ^2.7.0
# exporting & sharing
  path_provider: ^2.1.4
  share_plus: ^13.1.0
  pdf: ^3.11.0
  printing: ^5.13.4

dev_dependencies:
  flutter_test:
    sdk: flutter
# code generation & linting
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  freezed: ^3.2.5
  json_serializable: ^6.9.5
  very_good_analysis: ^10.0.0


flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/

